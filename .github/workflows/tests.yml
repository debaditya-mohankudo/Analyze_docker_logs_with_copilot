name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.history'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.history'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests (excluding integration tests)
        run: uv run pytest tests/ -m "not integration" --cov=docker_log_analyzer --cov-report=term-missing -n auto --durations=10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
